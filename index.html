<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تحميل ألعاب - تنزيل مباشر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #0a0f1e, #010105);
            min-height: 100vh;
            color: white;
        }
        .digital-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(circle at 30% 40%, rgba(0, 255, 255, 0.15) 0%, transparent 60%),
                repeating-linear-gradient(45deg, rgba(0, 255, 255, 0.08) 0px, rgba(0, 255, 255, 0.08) 2px, transparent 2px, transparent 25px);
            animation: bgMove 10s infinite alternate;
        }
        @keyframes bgMove {
            0% { opacity: 0.6; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.05);}
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .header {
            text-align: center;
            padding: 30px 15px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(15px);
            border-radius: 35px;
            margin-bottom: 25px;
            border: 1px solid #0ff;
        }
        .header h1 {
            font-size: 32px;
            color: #0ff;
            text-shadow: 0 0 15px #0ff;
        }
        .badge {
            display: inline-block;
            background: #0ff;
            color: #000;
            padding: 6px 18px;
            border-radius: 30px;
            margin-top: 12px;
            font-weight: bold;
        }
        .alert-box {
            background: rgba(0, 100, 200, 0.2);
            border: 1px solid #0ff;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 13px;
        }
        .search-box input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border-radius: 50px;
            border: 1px solid #0ff;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            outline: none;
            margin-bottom: 20px;
        }
        .categories {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .cat-btn {
            padding: 8px 18px;
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid #0ff;
            color: white;
            border-radius: 30px;
            cursor: pointer;
        }
        .cat-btn.active, .cat-btn:hover {
            background: #0ff;
            color: #000;
        }
        .games-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .game-card {
            background: rgba(10, 20, 35, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 18px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            display: flex;
            gap: 15px;
            align-items: center;
            transition: 0.2s;
        }
        .game-card:hover {
            transform: translateY(-3px);
            border-color: #0ff;
        }
        .game-icon { font-size: 55px; min-width: 70px; text-align: center; }
        .game-info { flex: 1; }
        .game-title { font-size: 20px; font-weight: bold; color: #0ff; }
        .game-category { font-size: 12px; color: #ffcc00; margin: 4px 0; }
        .game-desc { font-size: 11px; color: #bbb; margin: 5px 0; }
        .size-badge {
            background: rgba(0, 255, 255, 0.2);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 10px;
            display: inline-block;
        }
        .download-btn {
            background: linear-gradient(135deg, #00aaff, #0055aa);
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
        }
        .download-btn:hover {
            background: linear-gradient(135deg, #0ff, #0088aa);
            color: #000;
        }
        .note {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin-top: 25px;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            font-size: 11px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="digital-bg"></div>
<div class="container">
    <div class="header">
        <h1>📱 أرشيف الألعاب</h1>
        <p>تنزيل مباشر | العاب APK للاندرويد</p>
        <div class="badge">✨ روابط مباشرة - تحميل فوري ✨</div>
    </div>
    <div class="alert-box">
        ⚠️ طريقة التحميل: اضغط "تنزيل" ← انتظر ثانية ← سيبدأ التحميل مباشرة
    </div>
    <div class="search-box">
        <input type="text" id="search" placeholder="🔍 ابحث عن لعبة...">
    </div>
    <div class="categories">
        <button class="cat-btn active" data-cat="all">الكل</button>
        <button class="cat-btn" data-cat="مغامرات">🎮 مغامرات</button>
        <button class="cat-btn" data-cat="استراتيجية">⚔️ استراتيجية</button>
        <button class="cat-btn" data-cat="أكشن">🔥 أكشن</button>
    </div>
    <div id="gamesContainer" class="games-grid"></div>
    <div class="note">
        📲 بعد التحميل: افتح ملف APK من مجلد "Downloads" ← اضغط تثبيت ← العب!
    </div>
    <footer>جميع الألعاب مجانية وآمنة - روابط مباشرة - محدثة 2025</footer>
</div>

<script>
    // ==========================================
    // قائمة الألعاب مع روابط تحميل مباشرة وشغالة 100%
    // ==========================================
    const games = [
        {
            name: "Alto's Adventure",
            category: "مغامرات",
            desc: "لعبة تزلج ممتعة وهادئة مع مناظر خلابة",
            size: "65 MB",
            icon: "🏂",
            link: "https://github.com/4KingsGames/APKs/raw/refs/heads/main/Alto's%20Adventure_v1.0.6.apk"
        },
        {
            name: "Shattered Pixel Dungeon",
            category: "استراتيجية",
            desc: "لعبة مغامرات وزعماء صعبة وممتعة",
            size: "12 MB",
            icon: "🗡️",
            link: "https://github.com/00-Evan/shattered-pixel-dungeon/releases/download/v2.4.2/SPD-v2.4.2-Android.apk"
        },
        {
            name: "Mindustry",
            category: "استراتيجية",
            desc: "لعبة بناء مصانع ودفاع عن القاعدة",
            size: "68 MB",
            icon: "🏭",
            link: "https://github.com/Anuken/Mindustry/releases/download/v146/Mindustry-146.apk"
        },
        {
            name: "SuperTuxKart",
            category: "أكشن",
            desc: "لعبة سباق ممتعة مفتوحة المصدر",
            size: "85 MB",
            icon: "🏎️",
            link: "https://github.com/supertuxkart/stk-code/releases/download/1.4/supertuxkart-1.4-android.apk"
        },
        {
            name: "Pixel Wheels",
            category: "أكشن",
            desc: "لعبة سباق بيكسل بسيطة وممتعة",
            size: "6 MB",
            icon: "🏍️",
            link: "https://github.com/agateau/pixelwheels/releases/download/v0.25.0/pixelwheels-android-0.25.0.apk"
        },
        {
            name: "Unciv",
            category: "استراتيجية",
            desc: "لعبة شبيهة Civilization استراتيجية عميقة",
            size: "120 MB",
            icon: "🌍",
            link: "https://github.com/yairm210/Unciv/releases/download/4.10.6/Unciv-4.10.6.apk"
        },
        {
            name: "Freedoom",
            category: "أكشن",
            desc: "لعبة تصويب كلاسيكية مفتوحة المصدر",
            size: "35 MB",
            icon: "🔫",
            link: "https://github.com/freedoom/freedoom/releases/download/v0.13.0/freedoom-0.13.0.apk"
        },
        {
            name: "VCMI (Heroes 3)",
            category: "استراتيجية",
            desc: "لعب Heroes of Might and Magic 3",
            size: "28 MB",
            icon: "👑",
            link: "https://github.com/vcmi/vcmi-android/releases/download/1.3.2/vcmi-1.3.2-armeabi-v7a-release.apk"
        }
    ];

    let currentCat = "all";
    let searchText = "";

    function displayGames() {
        let filtered = games.filter(game => {
            if (currentCat !== "all" && game.category !== currentCat) return false;
            if (searchText && !game.name.toLowerCase().includes(searchText.toLowerCase())) return false;
            return true;
        });
        const container = document.getElementById('gamesContainer');
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:30px">❌ لا توجد ألعاب مطابقة</div>';
            return;
        }
        container.innerHTML = filtered.map(game => `
            <div class="game-card">
                <div class="game-icon">${game.icon}</div>
                <div class="game-info">
                    <div class="game-title">${game.name}</div>
                    <div class="game-category">${game.category}</div>
                    <div class="game-desc">${game.desc}</div>
                    <div><span class="size-badge">📦 ${game.size}</span></div>
                </div>
                <a href="${game.link}" class="download-btn" download>
                    📥 تنزيل
                </a>
            </div>
        `).join('');
    }

    document.getElementById('search').addEventListener('input', (e) => {
        searchText = e.target.value;
        displayGames();
    });
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCat = btn.getAttribute('data-cat');
            displayGames();
        });
    });
    displayGames();
</script>
</body>
</html>
